name: Docker (main)

# Baut & veröffentlicht ein rollendes Docker-Image auf GHCR, sobald sich auf
# `main` Docker-relevante Dateien ändern (Dockerfile, Backend, Add-on, …).
#
# Tags:
#   - :main           ← immer der aktuelle main-HEAD
#   - :sha-<short>    ← exakte Commit-SHA (für Rollback / Reproduzierbarkeit)
#
# `:latest` und `:<version>` bleiben dem Release-Workflow (Tag-Push) vorbehalten.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '_wiki_server/**'
      - 'hermes_portal/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # Mehrere Pushs hintereinander → nur der letzte baut komplett durch.
  group: docker-main
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        shell: bash
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hermes-portal:main
            ghcr.io/${{ github.repository_owner }}/hermes-portal:sha-${{ steps.sha.outputs.short }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
