name: Release

# Triggert auf Tag-Push (z.B. v0.8.0) oder manuell aus der Actions-UI.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (z.B. v0.8.0)'
        required: true

permissions:
  contents: write   # für gh release create
  packages: write   # für GHCR docker push

jobs:
  # =====================================================================
  # 1) Native Installer:
  #    - macOS Intel    (.dmg, x86_64,  Runner: macos-13)
  #    - macOS Silicon  (.dmg, arm64,   Runner: macos-14)
  #    - Linux          (.AppImage, x86_64, Runner: ubuntu-latest)
  #    - Windows        (.exe Setup,        Runner: windows-latest)
  # =====================================================================
  binaries:
    name: Build ${{ matrix.label }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13-Runner (Intel) sind seit Q2 2026 stark rationiert und
          # bleiben oft Stunden in "Waiting for a runner". Intel-Macs vor 2020
          # sind außerdem im Steady-State-Userkreis sehr selten — daher raus.
          # Wer auf Intel-Mac will: Repo selbst klonen + PyInstaller laufen lassen.
          - label: "macOS Apple Silicon"
            os: macos-14
            installer: Hermes-Portal-macOS.pkg
            kind: pkg
          - label: "Linux x86_64"
            os: ubuntu-latest
            installer: Hermes-Portal-Linux.AppImage
            kind: appimage
          - label: "Windows x64"
            os: windows-latest
            installer: Hermes-Portal-Setup.exe
            kind: exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r _wiki_server/requirements.txt
          # pillow → PyInstaller braucht es auf Windows für PNG → ICO
          pip install pyinstaller pillow

      - name: Install pywebview (Mac + Windows nur)
        # pywebview wraps die App in ein natives Fenster (WKWebView auf mac,
        # WebView2 auf Windows — beides OS-Standard, kein Extra-Install
        # für den End-User). Linux würde GTK-/QT-WebKit-Libs brauchen, die
        # sich in AppImage schwer bündeln lassen → Linux behält Browser-Fallback.
        if: runner.os == 'macOS' || runner.os == 'Windows'
        shell: bash
        run: pip install pywebview

      - name: Fetch Monaco editor (vendored offline)
        shell: bash
        run: python _wiki_server/scripts/fetch_monaco.py

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            T="${{ github.event.inputs.tag }}"
          else
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"
          echo "version=${T#v}" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        shell: bash
        working-directory: _wiki_server
        # HP_VERSION wird im BUNDLE-Step der Spec für CFBundleVersion +
        # CFBundleShortVersionString gelesen — wichtig für PKG-Identität.
        env:
          HP_VERSION: ${{ steps.ver.outputs.version }}
        run: pyinstaller --noconfirm hermes_portal.spec

      # ==================================================================
      # ==================================================================
      # macOS: PyInstaller's BUNDLE-Step hat das .app schon korrekt
      # gebaut (mit Contents/Frameworks/Python, Info.plist, .icns aus
      # logo.png). Wir müssen nur noch:
      #   1. xattrs strippen (quarantine)
      #   2. Ad-hoc signieren
      #   3. PKG-Installer drumherum bauen
      # ==================================================================
      - name: Sign + package macOS .app → .pkg installer
        if: matrix.kind == 'pkg'
        shell: bash
        run: |
          set -e
          APP="_wiki_server/dist/Hermes Portal.app"
          if [ ! -d "$APP" ]; then
            echo "❌ BUNDLE-Step in spec hat keine .app erzeugt: $APP fehlt"
            ls -la _wiki_server/dist/ || true
            exit 1
          fi

          echo "→ PyInstaller-Bundle-Struktur:"
          ls -la "$APP/Contents/"
          echo "→ Frameworks (sollte 'Python' enthalten):"
          ls -la "$APP/Contents/Frameworks/" || echo "(kein Frameworks/, BUNDLE-Step hat versagt)"

          # Alle xattrs strippen (quarantine, finder-flags, etc.)
          xattr -cr "$APP"

          # Ad-hoc signieren via Python-Script
          python3 _wiki_server/scripts/sign_macos_app.py "$APP"

          # PKG-Installer bauen via pkgbuild + productbuild.
          # pkgbuild erstellt eine Component-Package, die die .app nach
          # /Applications/ installiert. productbuild wrapped es in einen
          # User-facing Installer mit Welcome/Conclusion-Screens.
          rm -rf staging
          mkdir -p staging/Applications
          cp -R "$APP" "staging/Applications/"

          pkgbuild --root staging \
                   --identifier de.jayjojayson.hermes-portal \
                   --version "${{ steps.ver.outputs.version }}" \
                   --install-location / \
                   "Hermes-Portal-component.pkg"

          # Distribution-XML für productbuild (Welcome/License optional)
          cat > distribution.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Hermes Portal</title>
              <organization>de.jayjojayson</organization>
              <domains enable_localSystem="true"/>
              <options customize="never" require-scripts="false" hostArchitectures="arm64,x86_64"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="hermes-portal"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="hermes-portal" visible="false">
                  <pkg-ref id="de.jayjojayson.hermes-portal"/>
              </choice>
              <pkg-ref id="de.jayjojayson.hermes-portal" version="${{ steps.ver.outputs.version }}"
                       onConclusion="none">Hermes-Portal-component.pkg</pkg-ref>
          </installer-gui-script>
          XML

          productbuild --distribution distribution.xml \
                       --package-path . \
                       "${{ matrix.installer }}"

          # Cleanup
          rm -rf staging "Hermes-Portal-component.pkg" distribution.xml
          ls -lh "${{ matrix.installer }}"

      # ==================================================================
      # Windows: Inno Setup 6 (auf windows-latest vorinstalliert)
      # ==================================================================
      - name: Build Windows .exe installer (Inno Setup)
        if: matrix.kind == 'exe'
        shell: bash
        run: |
          set -e
          cat > installer.iss <<'ISS'
          [Setup]
          AppName=Hermes Portal
          AppVersion=__VERSION__
          AppPublisher=Hermes Portal Contributors
          AppPublisherURL=https://github.com/jayjojayson/Hermes-Portal
          DefaultDirName={autopf}\Hermes Portal
          DefaultGroupName=Hermes Portal
          DisableProgramGroupPage=yes
          UninstallDisplayIcon={app}\hermes-portal.exe
          OutputDir=.
          OutputBaseFilename=Hermes-Portal-Setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          WizardStyle=modern

          [Languages]
          Name: "de"; MessagesFile: "compiler:Languages\German.isl"
          Name: "en"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Desktop-Verknüpfung anlegen"; GroupDescription: "Zusätzliche Verknüpfungen:"

          [Files]
          Source: "_wiki_server\dist\hermes-portal\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs ignoreversion

          [Icons]
          Name: "{group}\Hermes Portal"; Filename: "{app}\hermes-portal.exe"
          Name: "{group}\Hermes Portal deinstallieren"; Filename: "{uninstallexe}"
          Name: "{userdesktop}\Hermes Portal"; Filename: "{app}\hermes-portal.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\hermes-portal.exe"; Description: "Hermes Portal jetzt starten"; Flags: nowait postinstall skipifsilent
          ISS
          sed -i 's/__VERSION__/${{ steps.ver.outputs.version }}/' installer.iss
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" installer.iss
          mv Hermes-Portal-Setup.exe "${{ matrix.installer }}" 2>/dev/null || true
          ls -lh "${{ matrix.installer }}"

      # ==================================================================
      # Linux AppImage
      # ==================================================================
      - name: Build Linux AppImage
        if: matrix.kind == 'appimage'
        shell: bash
        run: |
          set -e
          wget -q -O appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract >/dev/null
          APPIMAGETOOL="$(pwd)/squashfs-root/AppRun"

          APPDIR="HermesPortal.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -R _wiki_server/dist/hermes-portal/. "$APPDIR/usr/bin/"
          cp _wiki_server/static/portal/logo.png "$APPDIR/hermes-portal.png"
          cat > "$APPDIR/hermes-portal.desktop" <<DESK
          [Desktop Entry]
          Type=Application
          Name=Hermes Portal
          Comment=Webfrontend für den Hermes-Agent
          Exec=hermes-portal
          Icon=hermes-portal
          Categories=Network;WebBrowser;Utility;
          Terminal=true
          DESK
          cat > "$APPDIR/AppRun" <<'RUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/hermes-portal" "$@"
          RUN
          chmod +x "$APPDIR/AppRun"

          ARCH=x86_64 "$APPIMAGETOOL" "$APPDIR" "${{ matrix.installer }}"
          chmod +x "${{ matrix.installer }}"
          ls -lh "${{ matrix.installer }}"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer }}
          path: ${{ matrix.installer }}
          retention-days: 14

  # =====================================================================
  # 2) Docker-Image (multi-arch) auf GHCR
  # =====================================================================
  docker:
    name: Docker image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            T="${{ github.event.inputs.tag }}"
          else
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"
          echo "version=${T#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hermes-portal:latest
            ghcr.io/${{ github.repository_owner }}/hermes-portal:${{ steps.tag.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0

  # =====================================================================
  # 3) GitHub-Release erstellen + nur die nativen Installer anhängen
  # =====================================================================
  release:
    name: Publish GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            T="${{ github.event.inputs.tag }}"
          else
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p out
          find release-assets -type f -exec cp {} out/ \;
          ls -lh out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: out/*
          body: |
            ## 🛰️ Hermes Portal ${{ steps.tag.outputs.tag }}

            ### 📋 Changelog

            - 🇬🇧 **[What's new — full changelog](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/Changelog_eng.md)** (English)
            - 🇩🇪 **[Vollständiges Changelog](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/CHANGELOG.md)** (Deutsch)

            ### 💾 Installation

            | Platform | File | How to install |
            |----------|------|----------------|
            | **macOS (Apple Silicon, M1/M2/M3/M4)** | `Hermes-Portal-macOS.pkg` | Double-click, run the installer wizard. See note below. |
            | **Windows (x64)**                      | `Hermes-Portal-Setup.exe` | Run the setup wizard. |
            | **Linux (x86_64)**                     | `Hermes-Portal-Linux.AppImage` | `chmod +x` and run. |
            | **Docker**                              | `docker pull ghcr.io/${{ github.repository_owner }}/hermes-portal:${{ steps.tag.outputs.tag }}` | — |
            | **Home Assistant Add-on**              | Add repo `https://github.com/${{ github.repository }}` as HA add-on source | — |

            > **Intel Mac (pre-2020)**: not in releases since v1.0.0.
            > GitHub Actions Intel runners are rationed (hour-long waits).
            > Intel users: clone the repo + run `pyinstaller` yourself, or
            > use the Docker variant.

            #### 🍎 macOS PKG installer (ad-hoc signed)

            The PKG is ad-hoc signed, not notarized by Apple (which would
            require a paid Apple Developer account). On first install macOS
            may show a Gatekeeper warning. Workaround **before** opening
            the PKG — strip the quarantine flag from the download:

            ```bash
            xattr -dr com.apple.quarantine ~/Downloads/Hermes-Portal-macOS.pkg
            ```

            Then double-click the PKG → installer guides you through, app
            lands in `/Applications/Hermes Portal.app`. Launch via
            Launchpad or Spotlight as usual.

            Full installation guide in the [README](https://github.com/${{ github.repository }}#-installation) ·
            🇩🇪 [Deutsche Anleitung](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/README.de.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
